<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zollamt Jachenau Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --gradient-btn-1: linear-gradient(135deg, #ff9233 0%, #ff5e62 100%);
            --gradient-btn-2: linear-gradient(135deg, #7028ff 0%, #ff4b91 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }

        .app-container {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* NEU: Die Scroll-Pill */
        .scroll-pill {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 150;
            padding: 8px 16px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .scroll-pill.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Restliche Styles unverändert... */
        header { padding: 30px 24px 10px 24px; }
        .sub-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 4px; }
        .main-title { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .balance-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8); margin: 10px 24px 24px 24px; padding: 30px 24px; border-radius: 28px; box-shadow: var(--shadow); text-align: center; }
        .balance-label { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
        .balance-amount { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        .balance-spent { margin-top: 10px; font-size: 0.85rem; color: #ef4444; font-weight: 600; background: #fee2e2; display: inline-block; padding: 4px 12px; border-radius: 20px; }
        .view { display: none; padding: 0 24px; flex-direction: column; gap: 16px; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .view.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .section-label { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-top: 10px; margin-bottom: 4px; }
        .action-btn { display: flex; align-items: center; justify-content: space-between; padding: 24px; border-radius: 24px; color: white; text-decoration: none; font-weight: 700; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: none; cursor: pointer; transition: transform 0.2s ease; }
        .btn-orange { background: var(--gradient-btn-1); }
        .btn-purple { background: var(--gradient-btn-2); }
        .transaction-list { display: flex; flex-direction: column; gap: 12px; }
        .transaction-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 16px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .trans-icon-info { display: flex; align-items: center; gap: 16px; }
        .trans-icon { width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .inflow .trans-icon { background: #dcfce7; color: #16a34a; }
        .outflow .trans-icon { background: #fee2e2; color: #dc2626; }
        .qr-floating-btn { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4); z-index: 99; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; height: 80px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 0.75rem; font-weight: 600; gap: 4px; width: 80px; height: 100%; justify-content: center; cursor: pointer; }
        .nav-item.active { color: var(--text-main); }
        .qr-modal { position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 430px; height: 100%; background: #f1f5f9; z-index: 200; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
        .qr-modal.open { transform: translateX(-50%) translateY(0); }
        .close-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, #ff4141 0%, #ff7343 100%); color: white; border: none; border-radius: 24px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>

    <!-- Die neue Pill -->
    <div id="scroll-pill" class="scroll-pill">Start</div>

    <div class="app-container">
        <header>
            <p class="sub-title" id="header-sub">Zollamt Jachenau</p>
            <h1 class="main-title" id="header-main">Hey!</h1>
        </header>

        <div class="balance-card">
            <p class="balance-label">Aktuelles Guthaben</p>
            <p class="balance-amount">7,34€</p>
            <span class="balance-spent" id="extra-info" style="display: none;">Gesamt ausgegeben: 1,33€</span>
        </div>

        <div id="view-start" class="view active">
            <p class="section-label">Schnellauswahl</p>
            <button class="action-btn btn-orange" onclick="switchTab('auszahlungen')"><span>Auszahlungen ansehen</span></button>
            <button class="action-btn btn-purple" onclick="switchTab('einzahlungen')"><span>Einzahlungen ansehen</span></button>
            <div style="height: 500px;"></div> <!-- Dummy für Scroll -->
        </div>

        <!-- Views hier... -->
        <div id="view-einzahlungen" class="view">...</div>
        <div id="view-auszahlungen" class="view">...</div>

        <div class="qr-floating-btn" onclick="toggleQR(true)"><i class="fa-solid fa-qrcode"></i></div>
        <div id="qr-screen" class="qr-modal">
            <h2>Dein QR-Code</h2>
            <button class="close-btn" onclick="toggleQR(false)">Schließen</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-start" onclick="switchTab('start')"><i class="fa-solid fa-house"></i><span>Start</span></div>
            <div class="nav-item" id="nav-einzahlungen" onclick="switchTab('einzahlungen')"><i class="fa-solid fa-piggy-bank"></i><span>Einzahlungen</span></div>
            <div class="nav-item" id="nav-auszahlungen" onclick="switchTab('auszahlungen')"><i class="fa-solid fa-receipt"></i><span>Auszahlungen</span></div>
        </nav>
    </div>

    <script>
        // Scroll Logik
        const scrollPill = document.getElementById('scroll-pill');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                scrollPill.classList.add('visible');
            } else {
                scrollPill.classList.remove('visible');
            }
        });

        function switchTab(tabName) {
            // Update Pill-Text
            scrollPill.innerText = tabName.charAt(0).toUpperCase() + tabName.slice(1);
            
            // Bestehende Switch-Logik...
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // ... (Rest der Logik von vorher)
            if(tabName === 'start') { document.getElementById('view-start').classList.add('active'); document.getElementById('nav-start').classList.add('active'); }
            else if(tabName === 'einzahlungen') { document.getElementById('view-einzahlungen').classList.add('active'); document.getElementById('nav-einzahlungen').classList.add('active'); }
            else if(tabName === 'auszahlungen') { document.getElementById('view-auszahlungen').classList.add('active'); document.getElementById('nav-auszahlungen').classList.add('active'); }
        }

        function toggleQR(show) { document.getElementById('qr-screen').classList.toggle('open', show); }
    </script>
</body>
</html>
