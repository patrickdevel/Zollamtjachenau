<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zollamt Jachenau Dashboard</title>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, update, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3kppZkw_z7LesZavzyqOq-L8x0aK4NsE",
            authDomain: "durchagngssystem.firebaseapp.com",
            databaseURL: "https://durchagngssystem-default-rtdb.firebaseio.com",
            projectId: "durchagngssystem",
            storageBucket: "durchagngssystem.firebasestorage.app",
            messagingSenderId: "681623652861",
            appId: "1:681623652861:web:5e54850cb9bb64a156f194"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        window.auth = auth;
        window.db = db;
        window.provider = new GoogleAuthProvider();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { /* ... (DEINE CSS VARIABLEN BLEIBEN GLEICH) ... */ }
        /* ... (DEIN GESAMTES CSS BLEIBT ERHALTEN) ... */
        
        /* Neu für das Admin Panel */
        .admin-panel { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        .admin-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scroll-pill" class="scroll-pill">Start</div>

    <div class="app-container">
        
        <header>
            <p class="sub-title" id="header-sub">Zollamt Jachenau</p>
            <h1 class="main-title" id="header-main">Hey!</h1>
        </header>

        <!-- ... (DEINE RESTLICHEN VIEWS BLEIBEN) ... -->
        
        <!-- NEUE ADMIN VIEW -->
        <div id="view-admin" class="view">
            <div class="admin-panel">
                <h3>Admin Steuerung</h3>
                <input type="number" id="admin-amount" placeholder="Betrag (€)" style="width:100%; padding:10px; margin-bottom:10px;">
                <button class="admin-btn btn-purple" onclick="handleMoney('add')">Hinzufügen</button>
                <button class="admin-btn btn-orange" onclick="handleMoney('deduct')">Abbuchen</button>
                <button class="admin-btn" onclick="switchTab('start')" style="background:#ccc;">Zurück</button>
            </div>
        </div>

        <!-- ... (DEIN RESTLICHER BODY BLEIBT UNVERÄNDERT) ... -->
        
        <nav class="bottom-nav">
            <!-- (Dein Code bleibt gleich) -->
            <div class="nav-item active" onclick="checkAdminAccess()"> <!-- Bonus: Klick auf ein Icon trigger Admin check -->
                <i class="fa-solid fa-lock"></i>
            </div>
        </nav>
    </div>

    <script>
        // ... (DEIN VORHANDENES JS BLEIBT ERHALTEN) ...

        // NEUE FUNKTION FÜR ADMIN
        async function checkAdminAccess() {
            const user = auth.currentUser;
            if (!user || user.email !== "patrick.x.roth@gmail.com") {
                alert("Nicht autorisiert!");
                return;
            }
            const code = prompt("Admin-Code eingeben:");
            if (code === "2014") {
                switchTab('admin');
            } else {
                alert("Falscher Code.");
            }
        }

        async function handleMoney(action) {
            const amount = parseFloat(document.getElementById('admin-amount').value);
            const user = auth.currentUser;
            if(!user || isNaN(amount)) return;

            const dbRef = ref(db, 'users/' + user.uid + '/balance');
            const snapshot = await get(dbRef);
            let currentBalance = snapshot.exists() ? snapshot.val() : 0;

            let newBalance = (action === 'add') ? currentBalance + amount : currentBalance - amount;
            
            await update(ref(db, 'users/' + user.uid), { balance: newBalance });
            
            // Log erstellen
            push(ref(db, 'logs/' + user.uid), {
                type: action,
                amount: amount,
                timestamp: Date.now()
            });
            
            alert("Erfolgreich durchgeführt.");
        }

        // Erweitere switchTab Funktion um 'admin' Case:
        // switchTab('admin') -> setze view-admin auf active
    </script>
</body>
</html>
